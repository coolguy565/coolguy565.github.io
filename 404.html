<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>404 - not found</title>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at top left, #7a00ff 0%, transparent 40%),
    radial-gradient(circle at bottom right, #4b0082 0%, transparent 40%),
    linear-gradient(135deg, #000000, #12001f, #000000);
  color:#eaeaea;
  font-family: system-ui, -apple-system, sans-serif;
}

.panel{
  width:85%;
  max-width:560px;
  padding:22px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(160,80,255,0.18);
  box-shadow:0 0 25px rgba(140,0,255,0.25);
}

h1{
  margin:0 0 6px;
  font-size:42px;

  background:linear-gradient(90deg,#7a00ff,#fff,#b07cff,#fff,#7a00ff);
  background-size:300% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;

  animation:shift 8s linear infinite;
}

@keyframes shift{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

.small{opacity:0.75;margin-bottom:18px;}

ul{
  margin:0;
  padding-left:18px;
}

li{
  margin:6px 0;
  opacity:0.9;
}

.shrine{
  margin-top:20px;
}

.shrine button{
  margin-bottom:10px;
  margin-right:8px;
  padding:8px 12px;
  background:transparent;
  border:1px solid rgba(160,80,255,0.4);
  color:#eaeaea;
  cursor:pointer;
}

.shrine button:hover{
  background:rgba(160,80,255,0.2);
}

#rain{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
}

/* 404 badge */
.badge{
  display:inline-block;
  padding:4px 10px;
  margin-bottom:10px;
  border:1px solid rgba(160,80,255,0.4);
  opacity:0.8;
  font-size:12px;
}
</style>
</head>

<body>

<div class="panel">

  <div class="badge">ERROR 404</div>

  <h1>not found</h1>

  <div class="small">
    the page you’re looking for doesn’t exist (or got moved into the void)
  </div>

  <div class="small">possible causes</div>
  <ul>
    <li>wrong URL typed</li>
    <li>page was deleted</li>
    <li>it never existed (classic)</li>
    <li>you broke reality’s routing table</li>
  </ul>

  <div class="shrine">

    <button onclick="toggleRain()">MATRIX</button>

    <button onclick="location.href='/'">
      Go Home
    </button>

    <button onclick="history.back()">
      Go Back
    </button>

  </div>

</div>

<canvas id="rain"></canvas>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");
const rand = (min, max)=>Math.floor(Math.random() * max) + min;

let active = false;
let drops = [];
let w, h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function createDrops(){
  drops = [];
  for(let i=0;i<150;i++){
    drops.push({
      x: Math.random()*w,
      y: Math.random()*h,
      v: 2 + Math.random()*5
    });
  }
}

function getChar() {
  const r = Math.random();

  if (r < 0.35) {
    const pool = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    return pool[rand(0, pool.length - 1)];
  }

  if (r < 0.6) {
    const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?";
    return symbols[rand(0, symbols.length - 1)];
  }

  return String.fromCharCode(0x4e00 + rand(0, 90));
}

function draw(){
  if(!active) return;

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle = "#b07cff";
  ctx.font = "18px monospace";

  for(let d of drops){
    const text = getChar();
    ctx.fillText(text, d.x, d.y);

    d.y += d.v;
    if(d.y > h){
      d.y = 0;
      d.x = Math.random()*w;
    }
  }

  requestAnimationFrame(draw);
}

function toggleRain(){
  active = !active;
  if(active){
    createDrops();
    draw();
  } else {
    ctx.clearRect(0,0,w,h);
  }
}
</script>

</body>
</html>
